name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Ubuntu
            os: ubuntu-latest
          - name: macOS / Bash 3.2
            os: macos-14
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
      - name: Show Bash version
        run: bash --version
      - name: Run tests
        env:
          UPDATE_BASH: /bin/bash
        run: make test
